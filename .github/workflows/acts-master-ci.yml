name: ACTS master + k4ActsTracking

on:
  push:
    branches:
    - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-acts-master:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v7

      - name: Clone ACTS master
        uses: actions/checkout@v7
        with:
          repository: acts-project/acts
          path: acts
          ref: main

      - shell: bash
        run: echo "NOW=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - uses: actions/cache/restore@v5
        with:
          path: ~/.cache/ccache
          key: ccache-acts-master-${{ env.NOW }}
          restore-keys: |
            ccache-acts-master-

      - name: Launch Container
        run: |
          mkdir -p ~/.cache/ccache
          chmod 777 ~/.cache/ccache
          name=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          docker run --name ci_container --privileged \
            -v ${GITHUB_WORKSPACE}:/${name} \
            -v ~/.cache/ccache:/root/.cache/ccache \
            -v ${GITHUB_WORKSPACE}/acts:/acts \
            -d ghcr.io/key4hep/key4hep-images/alma9-cvmfs \
            tail -f /dev/null

      - name: Build and test
        run: |
          name=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')

          cat << 'EOF' > ${GITHUB_WORKSPACE}/build.sh
          set -e

          repo=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')

          source /cvmfs/sw-nightlies.hsf.org/key4hep/setup.sh

          export CCACHE_DIR=/root/.cache/ccache
          export CCACHE_SLOPPINESS=include_file_ctime,include_file_mtime
          ccache --set-config=max_size=500M
          ccache -z

          # Build ACTS from master
          echo "=== Building ACTS from master ==="
          cd /acts
          cmake -B build -S . -GNinja \
            -DCMAKE_CXX_STANDARD=20 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=install \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DACTS_BUILD_PLUGIN_DD4HEP=ON \
            -DACTS_BUILD_PLUGIN_ROOT=ON \
            -DACTS_BUILD_PLUGIN_TGEO=ON \
            -DACTS_BUILD_PLUGIN_JSON=ON
          cmake --build build -- -j$(nproc)
          cmake --install build
          k4_local_repo

          echo "=== Building k4ActsTracking ==="
          cd /${repo}
          k4_local_repo
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_CXX_STANDARD=20 \
            -DCMAKE_INSTALL_PREFIX=../install \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_FLAGS="-Werror -Wno-error=cpp -Wno-error=deprecated-declarations" \
            -GNinja
          cmake --build . -- -j$(nproc)

          echo "=== Running tests ==="
          ctest -j $(nproc) --output-on-failure

          cmake --build . --target install

          ccache -s
          EOF

          chmod +x ${GITHUB_WORKSPACE}/build.sh

          docker exec ci_container /bin/bash /${name}/build.sh

      - name: Upload CTest logs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: CTest logs_acts-master_run${{ github.run_id }}_attempt${{ github.run_attempt }}
          path: |
            ${{ github.workspace }}/build/Testing/Temporary
            !${{ github.workspace }}/build/Testing/Temporary/CTestCostData.txt
          if-no-files-found: warn
          retention-days: 3

      - uses: actions/cache/save@v5
        if: always()
        with:
          path: ~/.cache/ccache
          key: ccache-acts-master-${{ env.NOW }}
